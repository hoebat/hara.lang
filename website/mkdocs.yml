site_name: Hara
site_description: A live language for systems that stay alive.
site_url: https://hoebat.github.io/hara.lang/
repo_url: https://github.com/hoebat/hara.lang
repo_name: hoebat/hara.lang
docs_dir: ../docs
theme:
  name: material
  custom_dir: overrides
  language: en
  font: false
  favicon: assets/hara-mark.png
  logo: assets/hara-mark.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Use light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Use dark mode
extra_css:
  - stylesheets/hara.css
extra_javascript:
  - javascripts/hara.js
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Learn:
      - User guide: user-guide.md
      - Getting started: getting-started.md
      - Namespaces and modules: namespaces.md
  - Walkthroughs:
      - Namespace project: walkthroughs/service-project.md
      - Library namespaces: walkthroughs/libraries.md
      - Testing namespaces: walkthroughs/testing.md
  - Build:
      - Developer guide: development.md
      - Java API: javadocs.md
  - Reference:
      - L0 language: reference/l0-language.md
      - Namespace catalog: reference/namespaces.md
      - Runtime libraries: reference/runtime-libraries.md
      - Extensions: reference/extensions-contract.md
      - Extension overview: reference/extensions.md
      - REPL UX: reference/repl.md
      - Native flavors: reference/native-flavors.md
      - JVM flavor: reference/jvm-flavor.md
      - Xtalk equivalence: reference/xtalk-equivalence.md
      - Rust/WASM runtime: reference/rust-runtime.md
