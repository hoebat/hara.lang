syntax = "proto3";

package hara.pod.v1;

option java_multiple_files = true;
option java_package = "hara.pod.v1";
option java_outer_classname = "PodProtocol";

message Envelope {
  uint64 request_id = 1;

  oneof body {
    HandshakeRequest handshake = 2;
    CallRequest call = 3;
    ReleaseRequest release = 4;
    CancelRequest cancel = 5;
    StreamRequest stream = 6;
    HandshakeResponse handshake_response = 7;
    CallResponse call_response = 8;
    ReleaseResponse release_response = 9;
    CancelResponse cancel_response = 10;
  }
}

message HandshakeRequest {
  uint32 abi_major = 1;
  uint32 abi_minor = 2;
  string client_name = 3;
  repeated string requested_capabilities = 4;
}

message Manifest {
  uint32 abi_major = 1;
  uint32 abi_minor = 2;
  string pod_name = 3;
  repeated Namespace namespaces = 4;
  repeated string capabilities = 5;
}

message HandshakeResponse {
  Manifest manifest = 1;
  Error error = 2;
}

message Namespace {
  string name = 1;
  repeated Function functions = 2;
}

message Function {
  string name = 1;
  uint32 minimum_arity = 2;
  int32 maximum_arity = 3;
  bool variadic = 4;
  repeated string capabilities = 5;
}

message CallRequest {
  string function = 1;
  repeated Value arguments = 2;
  uint64 deadline_millis = 3;
}

message CallResponse {
  oneof result {
    Value value = 1;
    Error error = 2;
    AsyncResult async = 3;
  }
}

message ReleaseRequest {
  Handle handle = 1;
}

message ReleaseResponse {
  Error error = 1;
}

message CancelRequest {
  uint64 target_request_id = 1;
}

message CancelResponse {
  bool cancelled = 1;
  Error error = 2;
}

message StreamRequest {
  string function = 1;
  repeated Value arguments = 2;
  bool close = 3;
}

message AsyncResult {
  Handle handle = 1;
}

message Error {
  string code = 1;
  string message = 2;
  string details = 3;
  bool retryable = 4;
}

message Handle {
  uint64 id = 1;
  string type = 2;
  string owner = 3;
}

message Value {
  oneof kind {
    NullValue null_value = 1;
    bool boolean_value = 2;
    int64 integer_value = 3;
    double floating_value = 4;
    string string_value = 5;
    bytes bytes_value = 6;
    Handle handle = 7;
    ListValue list = 8;
    MapValue map = 9;
    Tensor tensor = 10;
    BigIntegerValue big_integer = 11;
    DecimalValue decimal = 12;
  }
}

message BigIntegerValue {
  // Minimal signed, big-endian two's-complement representation.
  bytes twos_complement = 1;
}

message DecimalValue {
  BigIntegerValue unscaled = 1;
  sint32 scale = 2;
}

enum NullValue {
  NULL_VALUE_UNSPECIFIED = 0;
}

message ListValue {
  repeated Value values = 1;
}

message MapValue {
  repeated MapEntry entries = 1;
}

message MapEntry {
  Value key = 1;
  Value value = 2;
}

message Tensor {
  Handle storage = 1;
  repeated int64 shape = 2;
  repeated int64 strides = 3;
  string dtype = 4;
  string device = 5;
}
