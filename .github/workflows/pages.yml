name: Publish Hara documentation

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - "spec/hara/**"
      - "overrides/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - "pom.xml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Generate Java API documentation
        run: mvn -q -Pjavadoc javadoc:javadoc

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir site-build

      - name: Build Rust WASM package
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install wasm-bindgen-cli --version 0.2.126 --locked
          cargo build --manifest-path wasm/Cargo.toml --target wasm32-unknown-unknown --release
          npm ci --prefix wasm/web
          npm run --prefix wasm/web test:noir
          mkdir -p site-build/wasm
          wasm-bindgen --target web --out-dir site-build/wasm/pkg wasm/target/wasm32-unknown-unknown/release/hara_wasm.wasm
          cp wasm/web/index.html wasm/web/playground.css wasm/web/playground.js site-build/wasm/
          cp wasm/web/dist/noir-loader.js site-build/wasm/
          cp wasm/web/node_modules/@noir-lang/noir_wasm/dist/web/main.mjs site-build/wasm/noir-wasm.mjs

      - name: Add Java API documentation
        run: |
          mkdir -p site-build/api/java
          cp -R target/reports/apidocs/. site-build/api/java/
          cat docs/javadoc-theme.css >> site-build/api/java/stylesheet.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
