name: Java CI with Maven

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust WASM toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - name: Build raw Rust WASM extension artifact
      run: ./scripts/build-hara-wasm-raw
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build and test with Maven
      run: mvn -B -Ptruffle package --file pom.xml

    - name: Run JVM L0 conformance corpus
      run: mvn -B -Ptruffle -Dtest=hara.truffle.HaraL0ConformanceTest test

    - name: Run Rust WASM and Truffle parity corpus
      run: mvn -B -Ptruffle -Dtest=hara.truffle.HaraWasmTruffleParityTest test

    - name: Run JVM L0 benchmark matrix
      run: ./scripts/run-truffle-benchmark 2 1000 | tee target/l0-benchmark.txt

    - name: Upload JVM L0 benchmark evidence
      uses: actions/upload-artifact@v4
      with:
        name: l0-benchmark
        path: target/l0-benchmark.txt

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/

  native-image-smoke:
    runs-on: ubuntu-latest
    env:
      HARA_NATIVE_USE_FALLBACK_RUNTIME: 'true'

    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust WASM toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - name: Build raw Rust WASM extension artifact
      run: ./scripts/build-hara-wasm-raw
    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '21'
        distribution: 'graalvm-community'
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the Truffle Native Image
      run: ./scripts/build-truffle-native
    - name: Record Native Image build and startup metrics
      run: |
        {
          echo "native_image_version=$(native-image --version)"
          echo "native_runtime_mode=fallback"
          echo "binary_bytes=$(stat -c '%s' target/hara-truffle)"
          /usr/bin/time -f 'startup_seconds=%e' target/hara-truffle eval 'nil' >/dev/null
          echo "reachability_manifest=$(find target/classes/META-INF/native-image -type f -print | sort | tr '\n' ',')"
        } 2>&1 | tee target/native-image-metrics.txt
    - name: Run a Native Image smoke test
      run: |
        mkdir -p target/native-extensions/blockchain/proof/noir
        cp wasm/raw/target/wasm32-unknown-unknown/release/hara_wasm_raw.wasm \
          target/native-extensions/blockchain/proof/noir/noir.wasm
        cp examples/extensions/blockchain/proof/noir/hara.extension.edn \
          target/native-extensions/blockchain/proof/noir/hara.extension.edn
        test "$(target/hara-truffle conformance)" = "L0 conformance passed: 64 cases"
        test "$(HARA_EXTENSION_PATH="$PWD/target/native-extensions" target/hara-truffle eval '(ns app (:require [blockchain.proof.noir :as noir])) (noir/add 20 22)')" = "42"
        test "$(target/hara-truffle eval '(+ 19 23)')" = "42"
        test "$(target/hara-truffle eval '(bytes/u8 -1)')" = "255"
        test "$(target/hara-truffle eval '(protocol-call ICount count (bytes 1 2 3))')" = "3"
        test "$(target/hara-truffle eval '(let [a (array 1 2)] (do (. a (set 1 7)) (. a (get 1))))')" = "7"
        test "$(target/hara-truffle eval '(defstruct Person [name]) (protocol-call ILookup lookup (protocol-call IObjType meta (protocol-call IObjType with-meta (Person "Ada") {:doc "person"})) :doc)')" = "person"
        test "$(target/hara-truffle eval '(= -0.0 0.0)')" = "true"
        test "$(target/hara-truffle eval '(= 1.0M 1.00M)')" = "true"
        test "$(target/hara-truffle eval '(def ^:dynamic *answer* 1) (binding [*answer* 42] *answer*)')" = "42"
        test "$(target/hara-truffle eval '(def answer 1) (set! answer 42) answer')" = "42"
        test "$(target/hara-truffle eval '(let [it (concat [1] [2])] (iter-next it) (iter-next it))')" = "2"
        test "$(target/hara-truffle eval '(def answer 1) (defn add [x y] (+ x y)) (alter-var-root (var answer) add 41) answer')" = "42"
        test "$(target/hara-truffle eval '(defn sum3 [a b c] (+ a b c)) (apply sum3 1 [2 3])')" = "6"
        test "$(target/hara-truffle eval '(defstruct Problem [value]) (try (throw (Problem 7)) (catch Other error 0) (catch Problem error (field error :value)))')" = "7"
        test "$(target/hara-truffle eval '(ns source) (def answer 1) (ns user) (refer "source") (in-ns (quote source)) (set! answer 2) (in-ns (quote user)) answer')" = "2"
        test "$(target/hara-truffle eval '(load-resource "hara/l0-resource.hal")')" = "42"
        test "$(target/hara-truffle eval '(load-resource "hara/l0-core.hal") ((comp2 inc inc) 40)')" = "42"
        test "$(target/hara-truffle eval '(require "hara/l0-core.hal") ((comp2 inc inc) 40)')" = "42"
        test "$(target/hara-truffle eval '(defmulti kind (fn [x] (if (= x 1) :one :other))) (defmethod kind :one [x] "one") (defmethod kind :default [x] "other") (kind 2)')" = "other"
        test "$(target/hara-truffle eval '(do (defmacro unless [test body] `(if ~test nil ~body)) (unless false 42))')" = "42"
        test "$(target/hara-truffle eval '(do (declare answer) (def answer 42) (defn- read-answer [] answer) (read-answer))')" = "42"
    - name: Upload Native Image evidence
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: native-image-evidence
        path: |
          target/native-image-metrics.txt
          target/hara-truffle
          target/*build_report*
